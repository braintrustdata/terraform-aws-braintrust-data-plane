apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: {{ .Values.writer.nodePoolName }}
spec:
  template:
    metadata:
      labels:
        role: brainstore-writer
    spec:
      taints:
        - key: dedicated
          value: brainstore
          effect: NoSchedule
      requirements:
        - key: eks.amazonaws.com/instance-family
          operator: In
          values:
{{ toYaml .Values.instanceFamilies | indent 12 }}
        - key: eks.amazonaws.com/instance-size
          operator: In
          values:
{{ toYaml .Values.writer.instanceSizes | indent 12 }}
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - on-demand
            - spot
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: {{ .Values.writer.nodeClassName }}
  limits:
    cpu: {{ .Values.writer.cpuLimit | quote }}
    memory: {{ .Values.writer.memoryLimit | quote }}
